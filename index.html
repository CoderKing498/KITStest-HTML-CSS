<!DOCTYPE html>
<!-- Language: English-->
<html lang="en">
<head>
    <!-- META -->

    <!-- Sets the character encoding for the portfolio -->
    <meta charset="UTF-8">
    <!-- Configures the viewport to ensure proper display on mobile devices-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Specifies the author of the website -->
    <meta name="author" content="Diego Rodriguez">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">


    <!-- ICON -->
    <!-- Add a shortcut icon -->
    <link rel="shortcut icon" href="/src/images/kapanga.png" type="image/png">

    
    <!-- CSS  -->
    <link rel="stylesheet" href="src/styles/styles.css">
    <!-- TITLE  -->
    <title>KapangA</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="#" class="nav-branding">KapangA</a>
            <ul class="nav-menu">
                <li class="new-item">
                    <a href="#" class="nav-link">Events</a>
                </li>
                <li class="new-item">
                    <a href="#" class="nav-link">Media</a>
                </li>
                <li class="new-item">
                    <a href="#" class="nav-link">About</a>
                </li>
                <li class="new-item">
                    <a href="#" class="nav-link">Contact</a>
                </li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>
        <section id="Concert" class="contact">
            <h2 class="section-title">Contact us</h2>
            <form class="contact-form" id="contact-form">
                <div class="input-group">

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Name">

                    <label for="phone">Phone number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Phone number">

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Email">

                    <label for="message">Message</label>
                    <textarea id="message" name="message" cols="30" rows="5" placeholder="Message"></textarea>

                    <div class="form-text">
                        <a href="#">Privacy Policy</a>
                        <a href="#">Terms of Service</a>
                    </div>
                </div>
            </form>
        </section>
</body>
</html>
